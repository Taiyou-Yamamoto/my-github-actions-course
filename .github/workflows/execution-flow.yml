name: Website Deployment
on:
    push:
        branches:
            - main
        paths:
            - 'Code/06 Execution Flow/01 Starting Project/'
            - '.github/workflows/execution-flow.yml'
jobs:
    lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 'Code/06 Execution Flow/01 Starting Project'
        steps:
            - name: Get code
              uses: actions/checkout@v4
            - name: Cache dependencies
              id: cache
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
            - name: Install dependencies
              run: npm ci
            - name: Lint code
              run: npm run lint
    test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 'Code/06 Execution Flow/01 Starting Project'
        steps:
            - name: Get code
              uses: actions/checkout@v4
            - name: Cache dependencies
              id: cache
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
            - name: Install dependencies
              run: npm ci
            - name: Test code
              run: npm run test
            - name:
                  Upload test report
                  # if:
              uses: actions/upload-artifact@v4
              with:
                  name: test-report
                  path: test.json
    build:
        needs: test
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 'Code/06 Execution Flow/01 Starting Project'
        steps:
            - name: Get code
              uses: actions/checkout@v4
            - name: Cache dependencies
              id: cache
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
            - name: Install dependencies
              run: npm ci
            - name: Build website
              id: build-website
              run: npm run build
            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-files
                  path: Code/06 Execution Flow/01 Starting Project/dist
    deploy:
        needs: build
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 'Code/06 Execution Flow/01 Starting Project'
        steps:
            - name: Get build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist-files
                  path: Code/06 Execution Flow/01 Starting Project/dist
            - name: Output contents
              run: ls
            - name: Deploy
              run: echo "Deploying..."
