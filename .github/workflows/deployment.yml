name: Deploy Project
on:
    push:
        paths:
            - 'Code/02 Basics/02 Starting Project/**'
            - '.github/workflows/**'
    workflow_dispatch: # 手動実行。pathsでの指定はできないので配列を使用した省略形は使用できない。個別に指定する。
jobs:
    test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 'Code/02 Basics/02 Starting Project'
        steps:
            - name: Get Code
              uses: actions/checkout@v3
            - name: Install NodeJS
              uses: actions/setup-node@v3
              with:
                  node-version: 18
            - name: Install dependencies
              run: npm ci
            - name: Run tests
              run: npm test
    deploy:
        needs: test # 識別子testのワークフローが成功したら、このワークフローが実行される
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 'Code/02 Basics/02 Starting Project'
        steps:
            - name: Get Code
              uses: actions/checkout@v3
            - name: Install NodeJS
              uses: actions/setup-node@v3
              with:
                  node-version: 18
            - name: Install dependencies
              run: npm ci
            - name: Build project
              run: npm run build
            - name: Deploy
              run: echo "Deploying..."
